version: '3.8'

services:
  db:
    image: mariadb:10.11
    container_name: e-bag-db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-ecommerce_db}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: e-bag-app
    environment:
      DATABASE_URL: mariadb://root:${DB_PASSWORD}@db:3306/${DB_NAME:-ecommerce_db}
      DB_NAME: ${DB_NAME:-ecommerce_db}
      DB_HOST: db
      DB_PORT: ${DB_PORT:-3306}
      DATABASE_POOL_SIZE: 10
      DATABASE_MAX_OVERFLOW: 20
      DATABASE_POOL_RECYCLE: 3600
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  test:
    build: .
    container_name: e-bag-test
    environment:
      DATABASE_URL: mariadb://root:${DB_PASSWORD}@db:3306/${DB_NAME:-ecommerce_test}
      DB_NAME: ${DB_NAME:-ecommerce_test}
      DB_HOST: db
      DB_PORT: ${DB_PORT:-3306}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./tests:/tests
      - ./app:/app
    command: pytest tests/ -v

volumes:
  db_data: